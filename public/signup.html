<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Gen-Z Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
        }
        .auth-card h1 {
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }
        .auth-card p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: left;
        }
        .auth-form .input-group {
            margin-bottom: 0;
        }
        .auth-form button {
            width: 100%;
            margin-top: 1rem;
        }
        .auth-links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
        #error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            min-height: 1.5em;
            text-align: center;
            margin-bottom: -1rem;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-3"></div>

    <div class="auth-container">
        <div class="auth-card bento-card glass-panel">
            <h1><span class="gradient-text">Sign Up</span></h1>
            <p>Start tracking your attendance.</p>
            
            <p id="error-msg"></p>

            <form id="signup-form" class="auth-form">
                <div class="input-group">
                    <label for="username">Choose a Username</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" required autocomplete="new-password">
                </div>
                <button type="submit" class="glass-btn primary-btn">Create Account</button>
            </form>

            <div class="auth-links">
                Already have an account? <a href="/login.html">Log In</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.textContent = '';
            
            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = '/index.html';
                } else {
                    errorMsg.textContent = data.error || 'Signup failed';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Try again.';
            }
        });
    </script>
</body>
</html>
