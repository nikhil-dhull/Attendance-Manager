<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Attendance Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p>Join Attendance Pro today.</p>
            
            <p id="error-msg" style="color: var(--danger); text-align: center; margin-bottom: 1rem;"></p>
            
            <form id="signup-form">
                <div class="input-group">
                    <label for="username">Full Name</label>
                    <input type="text" id="username" placeholder="Nikhil Dhull" required autocomplete="name">
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="At least 8 characters" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn primary-btn" style="width: 100%;">Create Account</button>
            </form>

            <div class="divider">or</div>

            <a href="/auth/google" class="btn google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                <span>Sign up with Google</span>
            </a>

            <div class="auth-footer">
                Already have an account? <a href="/login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.textContent = '';
            
            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = '/index.html';
                } else {
                    errorMsg.textContent = data.error || 'Signup failed';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Try again.';
            }
        });
    </script>
</body>
</html>
