<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Attendance Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Attendance Pro</h1>
            <p>Sign in to manage your progress.</p>
            
            <p id="error-msg" style="color: var(--danger); text-align: center; margin-bottom: 1rem;"></p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="name@company.com" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <div style="text-align: right; margin-bottom: 1rem;">
                    <a href="/forgot-password.html" style="font-size: 0.875rem; color: var(--accent-primary); text-decoration: none; font-weight: 600;">Forgot password?</a>
                </div>
                <button type="submit" class="btn primary-btn" style="width: 100%;">Sign In</button>
            </form>

            <div class="divider">or</div>

            <a href="/auth/google" class="btn google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                <span>Sign in with Google</span>
            </a>

            <div class="auth-footer">
                Don't have an account? <a href="/signup.html">Create one</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.textContent = '';
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = '/index.html';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Try again.';
            }
        });
    </script>
</body>
</html>
