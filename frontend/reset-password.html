<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Attendance Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>New Password</h1>
            <p>Create a secure password for your account.</p>
            
            <p id="message" style="text-align: center; margin-bottom: 1rem;"></p>
            
            <form id="reset-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="otp">Enter 6-Digit OTP</label>
                    <input type="text" id="otp" placeholder="000000" maxlength="6" pattern="\d{6}" required autocomplete="one-time-code">
                </div>
                <div class="input-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="At least 8 characters" required autocomplete="new-password">
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Re-enter password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn primary-btn" style="width: 100%;">Verify & Reset Password</button>
            </form>
        </div>
    </div>

    <script>
        // Pre-fill email if redirected from forgot-password
        const savedEmail = sessionStorage.getItem('resetEmail');
        if (savedEmail) {
            document.getElementById('email').value = savedEmail;
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const messageEl = document.getElementById('message');
            
            if (password !== confirm) {
                messageEl.textContent = 'Passwords do not match';
                messageEl.style.color = 'var(--danger)';
                return;
            }
            
            messageEl.textContent = 'Verifying...';
            messageEl.style.color = 'var(--text-secondary)';
            
            try {
                const res = await fetch('/api/reset-password-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    messageEl.textContent = 'Password reset successful! Redirecting to login...';
                    messageEl.style.color = 'var(--success)';
                    sessionStorage.removeItem('resetEmail');
                    setTimeout(() => window.location.href = '/login.html', 2000);
                } else {
                    messageEl.textContent = data.error || 'Failed to reset password';
                    messageEl.style.color = 'var(--danger)';
                }
            } catch (err) {
                messageEl.textContent = 'Network error. Try again.';
                messageEl.style.color = 'var(--danger)';
            }
        });
    </script>
</body>
</html>
