<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Attendance Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Reset Password</h1>
            <p>Enter your email to receive a recovery link.</p>
            
            <p id="message" style="text-align: center; margin-bottom: 1rem;"></p>
            
            <form id="forgot-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required autocomplete="email">
                </div>
                <button type="submit" class="btn primary-btn" style="width: 100%;">Send Recovery Link</button>
            </form>

            <div class="auth-footer">
                Remembered your password? <a href="/login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const messageEl = document.getElementById('message');
            
            messageEl.textContent = 'Processing...';
            messageEl.style.color = 'var(--text-secondary)';
            
            try {
                const res = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    messageEl.textContent = 'Check your email for the recovery link!';
                    messageEl.style.color = 'var(--success)';
                    document.getElementById('forgot-form').style.display = 'none';
                } else {
                    messageEl.textContent = data.error || 'Failed to send email';
                    messageEl.style.color = 'var(--danger)';
                }
            } catch (err) {
                messageEl.textContent = 'Network error. Try again.';
                messageEl.style.color = 'var(--danger)';
            }
        });
    </script>
</body>
</html>
