<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Attendance Pro</title>
    <meta name="description" content="Professional attendance tracking for the modern student.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="dashboard">
        <header class="header">
            <div class="header-text">
                <h1 class="title">Attendance Pro</h1>
                <p class="subtitle">Stay on track with your academic goals.</p>
            </div>
            <div class="user-controls" style="display: flex; align-items: center; gap: 1rem;">
                <div style="text-align: right;">
                    <div style="font-size: 0.875rem; color: var(--text-secondary); font-weight: 500;">Welcome back,</div>
                    <div id="display-username" style="font-weight: 700; color: var(--text-primary); margin-bottom: 0.25rem;">User</div>
                    <a href="/admin.html" id="admin-link" style="display: none; padding: 0.25rem 0.5rem; background: var(--bg-secondary); border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 600; color: var(--accent-primary); text-decoration: none; border: 1px solid var(--border-color);">Admin Dashboard</a>
                </div>
                <button id="add-subject-btn" class="btn primary-btn">+ New Subject</button>
                <button id="logout-btn" class="btn outline-btn" style="padding: 0.75rem;">Sign Out</button>
            </div>
        </header>

        <section class="overview">
            <p class="subtitle" style="text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; font-weight: 800; margin-bottom: 0.5rem;">Overall Attendance</p>
            <h2 id="overall-percentage">0%</h2>
        </section>

        <section class="subjects-grid" id="subjects-container">
            <!-- Subject cards injected by JS -->
        </section>
    </main>

    <!-- Modal for New Subject -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <h2>Add New Subject</h2>
            <form id="add-subject-form">
                <div class="input-group">
                    <label for="subject-name">Subject Name</label>
                    <input type="text" id="subject-name" required placeholder="e.g. Advanced Mathematics" autocomplete="off">
                </div>
                <div class="actions">
                    <button type="button" id="cancel-btn" class="btn outline-btn">Cancel</button>
                    <button type="submit" class="btn primary-btn">Add Subject</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Edit Subject -->
    <div id="edit-modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <h2>Edit Subject</h2>
            <form id="edit-subject-form">
                <input type="hidden" id="edit-subject-id">
                <div class="input-group">
                    <label for="edit-subject-name">Subject Name</label>
                    <input type="text" id="edit-subject-name" required placeholder="Subject Name" autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="edit-subject-attended">Attended Classes</label>
                    <input type="number" id="edit-subject-attended" required min="0">
                </div>
                <div class="input-group">
                    <label for="edit-subject-total">Total Classes</label>
                    <input type="number" id="edit-subject-total" required min="0">
                </div>
                <div class="actions">
                    <button type="button" id="edit-cancel-btn" class="btn outline-btn">Cancel</button>
                    <button type="submit" class="btn primary-btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Template for Subject Card -->
    <template id="subject-card-template">
        <article class="bento-card subject-card">
            <div class="card-header">
                <h3 class="subject-title">Subject Name</h3>
                <div class="percentage-badge">0%</div>
            </div>
            
            <div class="stats-row">
                <div class="stat">
                    <span>Present</span>
                    <strong class="attended-val">0</strong>
                </div>
                <div class="stat">
                    <span>Total</span>
                    <strong class="total-val">0</strong>
                </div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-bar-fill"></div>
            </div>

            <div class="analysis-text">
                <span class="status-message">Calculating...</span>
                <span class="last-updated"></span>
            </div>

            <div class="action-buttons">
                <button class="icon-btn attended-btn">Present</button>
                <button class="icon-btn absent-btn">Absent</button>
                <button class="icon-btn ghost-btn edit-btn" title="Edit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
                <button class="icon-btn ghost-btn delete-btn" title="Delete">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
            </div>
        </article>
    </template>

    <script src="app.js"></script>
</body>
</html>
